services:
  api01: &api
    # Lembre-se de que seu serviço HTTP deve estar hospedado num repositório
    # publicamente acessível! Ex.: hub.docker.com
    image: rinha2026
    build:
      context: ..
      dockerfile: antifraud/Dockerfile
    hostname: api01
    environment:
      - DB_CONNECTION_STRING=Username=admin;Password=123;Host=db;Database=postgres;Pooling=true;Maximum Pool Size=20;No Reset On Close=true;Connection Lifetime=0;
      - ASPNETCORE_URLS=http://+:8080
    
    # Não é necessário expor qualquer porta além da porta do load balancer,
    # mas é comum as pessoas o fazerem para testaremsuas APIs e conectarem
    # ao banco de dados na fase de desenvolvimento.
    ports:
     - "8080"
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "45MB"

  api02:
    # Essa sintaxe reusa o que foi declarado em 'api01'.
    <<: *api
    hostname: api02
    environment:
      - DB_CONNECTION_STRING=Username=admin;Password=123;Host=db;Database=postgres;Pooling=true;Maximum Pool Size=20;No Reset On Close=true;Connection Lifetime=0;
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "8080"
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "45MB"
  
  nginx:
    image: docker.io/nginx:stable
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api01
      - api02
    ports:
      # Obrigatório expor/usar a porta 9999 no load balancer!
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "10MB"

  db:
    image: docker.io/pgvector/pgvector:pg18-trixie
    hostname: db
    environment:
      - POSTGRES_PASSWORD=123
      - POSTGRES_USER=admin
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./references.csv.gz:/var/lib/postgresql/data_import/references.csv.gz:ro
    deploy:
      resources:
        limits:
          # Note que a soma de todos os limites dos serviços
          # aqui declarados é de 1 unidades de CPU e 350MB
          # de memória. A distribuição feita aqui é apenas
          # um exemplo – distribua como quiser.
          cpus: "0.65"
          memory: "250MB"

# O uso do modo `bridge` deve ser adequado à carga que será usada no teste.
# A edição anterior se beneficiou do modo host pois o volume de requisições
# era relativamente alto e a virtualização da rede se tornou um gargalo, mas
# este modo é mais complexo de ser configurado. Fique à vontade para usar o
# modo que quiser desde que não conflite com portas trivialmente usadas em um
# SO.
networks:
  default:
    driver: bridge
    name: rinha-nginx-2026