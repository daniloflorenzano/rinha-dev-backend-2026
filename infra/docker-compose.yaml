services:
  api01: &api
    image: rinha2026
    build:
      context: ..
      dockerfile: antifraud/Dockerfile
    hostname: api01
    environment:
      - DB_CONNECTION_STRING=Username=admin;Password=123;Host=db;Database=postgres;Pooling=true;Maximum Pool Size=10;Connection Lifetime=0;No Reset On Close=true;
      - ASPNETCORE_URLS=http://+:8080

    ports:
      - "8080"
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "20MB"

  api02:
    <<: *api
    hostname: api02
    environment:
      - DB_CONNECTION_STRING=Username=admin;Password=123;Host=db;Database=postgres;Pooling=true;Maximum Pool Size=10;Connection Lifetime=0;No Reset On Close=true;
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "8080"
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "20MB"

  nginx:
    image: docker.io/nginx:stable
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api01
      - api02
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "10MB"

  db:
    image: docker.io/pgvector/pgvector:pg18-trixie
    hostname: db
    environment:
      - POSTGRES_PASSWORD=123
      - POSTGRES_USER=admin
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./references.csv.gz:/var/lib/postgresql/data_import/references.csv.gz:ro
    deploy:
      resources:
        limits:
          cpus: "0.65"
          memory: "300MB"
networks:
  default:
    driver: bridge
    name: rinha-nginx-2026
